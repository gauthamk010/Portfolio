<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gautham Keshav — Full-Stack Developer portfolio. React, Next.js, NestJS, MongoDB." />
    <title>Gautham Keshav — Full-Stack Developer Portfolio</title>

    <!-- Canonical URL (update to your actual domain) -->
    <link rel="canonical" href="https://www.gauthamk.online/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gautham Keshav — Full-Stack Developer Portfolio" />
    <meta property="og:description" content="ECE graduate & full-stack developer skilled in React, Next.js, NestJS, and MongoDB." />
    <meta property="og:url" content="https://www.gauthamk.online/" />
    <meta property="og:site_name" content="Gautham Keshav" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://gauthamk.online/og-image.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gautham Keshav — Full-Stack Developer Portfolio" />
    <meta name="twitter:description" content="ECE graduate & full-stack developer skilled in React, Next.js, NestJS, and MongoDB." />
    <meta name="twitter:image" content="https://gauthamk.online/og-image.webp" />

    <!-- Structured Data — Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Gautham Keshav",
      "url": "https://www.gauthamk.online",
      "jobTitle": "Junior Software Developer",
      "worksFor": { "@type": "Organization", "name": "Skillmine Technologies" },
      "alumniOf": { "@type": "CollegeOrUniversity", "name": "PES University" },
      "knowsAbout": ["React", "Next.js", "NestJS", "MongoDB", "Machine Learning"],
      "email": "mailto:gauthamkeshav1001@gmail.com",
      "address": { "@type": "PostalAddress", "addressLocality": "Bangalore", "addressCountry": "IN" }
    }
    </script>

    <!-- Preconnect to font & icon CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- Preload hero image (LCP element) — responsive -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/personal-photo-lg.webp"
      imagesrcset="/personal-photo-xs.webp 240w, /personal-photo-sm.webp 480w, /personal-photo-lg.webp 840w"
      imagesizes="(max-width: 768px) 240px, 420px"
      fetchpriority="high"
    />

    <!-- Google Fonts — loaded async to avoid render-blocking -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" />
    </noscript>

    <!-- Devicon CSS — loaded async to avoid render-blocking -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
